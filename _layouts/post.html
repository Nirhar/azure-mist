---
layout: default
---
<div class="post-container" markdown="1">
<h1> {{ page.title }} </h1>
<div class="post-meta">
  <i>{{ page.date | date_to_string }}</i>
  <i>{% assign words = content | number_of_words %}{% assign minutes = words | divided_by: 150 %}{% if minutes < 1 %}~1 min read{% else %}~{{ minutes }} min read{% endif %}</i>
</div>
<hr class="post-horizontal-rule">

{{content}}
</div>
